name: Build OpenWrt MT7628AN 16MB with SSR Plus

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev \
            libssl-dev python3-setuptools rsync swig unzip zlib1g-dev \
            file wget

      - name: Add SSR Plus feed
        run: |
          echo "src-git kenzok8 https://github.com/kenzok8/openwrt-packages" >> feeds.conf.default
          echo "src-git small https://github.com/kenzok8/small" >> feeds.conf.default

      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Set default LAN IP
        run: |
          sed -i 's/192.168.1.1/192.168.33.1/g' package/base-files/files/bin/config_generate

      - name: Set default WiFi SSID and password
        run: |
          cat >> package/base-files/files/etc/uci-defaults/99-wifi-default << 'EOF'
#!/bin/sh
uci set wireless.radio0.disabled='0'
uci set wireless.default_radio0.ssid='openwrt'
uci set wireless.default_radio0.encryption='psk2'
uci set wireless.default_radio0.key='admin1'
uci commit wireless
EOF

      - name: Configure target
        run: |
          cat > .config << 'EOF'
CONFIG_TARGET_ramips=y
CONFIG_TARGET_ramips_mt76x8=y
CONFIG_TARGET_ramips_mt76x8_DEVICE_mediatek_mt7628an-eval-board=y
CONFIG_PACKAGE_luci=y
CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
CONFIG_PACKAGE_luci-app-ssr-plus=y
CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Shadowsocksr_libev_Client=y
CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Xray=y
CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_DNS2TCP=y
CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_IPT2Socks=y
CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_ChinaDNS_NG=y
CONFIG_PACKAGE_luci-i18n-ssr-plus-zh-cn=y
EOF
          make defconfig

      - name: Download packages
        run: make download -j8 || make download -j1 V=s

      - name: Build firmware
        run: make -j$(nproc) || make -j1 V=s

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-mt7628an-16mb-ssr
          retention-days: 7
          path: bin/targets/ramips/mt76x8/*eval-board*
